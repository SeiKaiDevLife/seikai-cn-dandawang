<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氮氮的相册 | SeiKai & echoofmine</title>
    <link rel="stylesheet" href="index.css?v=2">
    <!-- Vue 3 CDN (无构建纯前端核心) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- CryptoJS CDN (用于密码哈希和 AES 加密) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" v-cloak>
        <!-- 登录界面 -->
        <div class="login-container" v-if="!isLoggedIn">
            <div class="glass-card">
                <div class="avatar-placeholder">🐱</div>
                <h1 class="title">氮氮的相册</h1>
                <p class="subtitle">SeiKai & echoofmine</p>
                <form @submit.prevent="handleLogin" class="form">
                    <input 
                        type="password" 
                        v-model="password"
                        :class="['input', { 'error-shake': loginError }]"
                        placeholder="请输入查看密码..."
                    />
                    <button type="submit" class="button">进入相册</button>
                </form>
            </div>
        </div>

        <!-- 主界面瀑布流 (开发中) -->
        <div class="main-app" v-else>
            <div style="padding: 2rem; text-align: center; color: #333;">
                <h1>相册首页瀑布流 (开发中...)</h1>
                <p>登录成功！</p>
                <button @click="logout" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #333; color: #fff; border: none; border-radius: 8px; cursor: pointer;">退出登录</button>
            </div>
        </div>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
