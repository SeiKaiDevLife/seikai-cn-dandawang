<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氮氮的相册 | SeiKai & echoofmine</title>
    <link rel="stylesheet" href="index.css?v=2">
    <!-- Vue 3 CDN (无构建纯前端核心) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- CryptoJS CDN (用于密码哈希和 AES 加密) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" v-cloak>
        <!-- 登录界面 -->
        <div class="login-container" v-if="!isLoggedIn">
            <div class="glass-card">
                <div class="avatar-placeholder">🐱</div>
                <h1 class="title">氮氮的相册</h1>
                <p class="subtitle">SeiKai & echoofmine</p>
                <form @submit.prevent="handleLogin" class="form">
                    <input 
                        type="password" 
                        v-model="password"
                        :class="['input', { 'error-shake': loginError }]"
                        placeholder="请输入查看密码..."
                    />
                    <button type="submit" class="button">进入相册</button>
                </form>
            </div>
        </div>

        <!-- 主界面瀑布流 -->
        <div class="main-app" v-else>
            <!-- 头图 -->
            <div class="hero-section">
                <!-- 留空的头图 -->
                <div class="hero-image-placeholder"></div>
                <div class="hero-overlay"></div>
            </div>
            
            <!-- 头像与简介 -->
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="avatar.webp" class="profile-avatar" alt="Avatar" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%23ddd\'/></svg>'">
                </div>
                <h1 class="profile-name">氮氮 Dandan</h1>
                <p class="profile-bio">SeiKai & echoofmine 的宝贝橘猫 🐾<br>每天都在吃和睡之间疯狂试探。</p>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-num">{{ meta.totalPosts || 0 }}</span>
                        <span class="stat-label">相册动态</span>
                    </div>
                </div>
            </div>

            <!-- 小红书风格瀑布流展示区 -->
            <div class="waterfall-container">
                <div class="timeline-post" v-for="post in posts" :key="post.id">
                    <!-- 封面图 (取第一张) -->
                    <div class="post-cover" v-if="post.images && post.images.length > 0">
                        <img :src="post.images[0]" loading="lazy">
                        <!-- 多图标志 -->
                        <div class="multi-img-icon" v-if="post.images.length > 1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                    </div>
                    
                    <div class="post-info">
                        <h2 class="post-title" v-if="post.title">{{ post.title }}</h2>
                        <p class="post-content" v-if="post.content">{{ post.content }}</p>
                        <div class="post-meta">
                            <span class="post-date">{{ formatDate(post.timestamp) }}</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bottom-actions">
                <button @click="logout" class="logout-btn">退出登录</button>
            </div>
        </div>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
